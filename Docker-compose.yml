services:

  mongo:
    image: mongo:8

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server

    ports:
      - "8000:8000"

    env_file:
      - ./server/.env

    depends_on:
      - mongo

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: http://localhost:8000/api
      
    ports:
      - "5173:80"

    depends_on:
      - server

volumes:
  mongo-data: